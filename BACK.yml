stalux:
    title: 个人博客
    url: https://stalux.needhelp.icu
    description: "博客主题Stalux - 为内容创作者提供的专业展示平台，支持多种自定义功能，包含评论系统集成、友情链接管理、社交媒体分享和丰富的SEO优化选项，让您的内容更具吸引力和可发现性。"
    # canonical: # 源指向 默认为 stalux.url
    # twitterSite: # Twitter 站点
    # noindex: # 是否禁止搜索引擎索引 默认 false
    # nofollow: # 是否禁止搜索引擎跟踪链接 默认 false
    # 分析工具和自定义头部配置
    head:
        # Google Analytics 4 跟踪 ID (格式: G-XXXXXXXXXX)
        # googleAnalyticsId: ""
        # Microsoft Bing Clarity 项目 ID
        # bingClarityId: ""
        # Umami 分析配置
        # umami:
        #   id: ""      # 网站 ID
        #   url: ""     # Umami 脚本 URL
        # 额外自定义头部内容（HTML字符串）
        anyhead: ""
    favicon: "/stalux.ico" # 网站图标路径，默认为根路径下

    author:
        name: felinus
        avatar: /avatar.png
        bio: 博客主题Stalux

    navs:
        - title: 首页
          icon: home
          link: /
        - title: 文章
          icon: archive
          link: /archives
        - title: 分类
          icon: folder
          link: /categories
        - title: 标签
          icon: tag
          link: /tags
        - title: 关于
          icon: user
          link: /about

    typetexts:
        - "While there is life there is hope!"
        - "Faith will move mountains."
        - "Fancy may kill or cure."
        - "If you live with a lame person, you will learn to limp. "

    mediaLinks:
        - icon: github
          link: https://github.com/felinus/stalux
        - icon: bilibili
          link: https://bilibili.com/
        - icon: X
          link: https://x.com
        - icon: juejin
          link: https://juejin.cn/
        - icon: zhihu
          link: https://www.zhihu.com/
        - icon: maildotru
          link: mailto:felinus@outlook.com
        - icon: telegram
          link: https://t.me/

    comment:
        enabled: true # 添加一个开关来启用或禁用评论区
        waline:
            serverURL: https://walines.felinus.fun
            lang: zh-CN
            # locale: # 可选，自定义语言配置
            login: "force" # 'enable' | 'disable' | 'force'（开启强制登录可防止伪造）
            recaptchaV3Key: "" # 可选，配置 reCAPTCHA v3 网站 key 以启用验证码
            turnstileKey: "" # 可选，配置 Cloudflare Turnstile key 以启用验证码
            dark: true
            reaction: false
            meta:
                - nick
                - mail
                - link
            requiredMeta: []
            commentSorting: "latest"
            # imageUploader: # 可选，自定义图片上传函数
            # highlighter: # 可选，自定义代码高亮函数
            # texRenderer: # 可选，自定义 TeX 渲染函数
            # search: # 可选，自定义搜索功能
            wordLimit: 200
            pageSize: 10
