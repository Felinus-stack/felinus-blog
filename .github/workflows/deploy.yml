# 自动化部署 Astro 到 GitHub Pages
name: Deploy Astro to GitHub Pages

# 当代码推送到 main 分支时自动部署
on:
  push:
    branches: [main]

# 部署权限
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 安装依赖
        run: npm install

      - name: 打包 Astro
        run: npm run build

      - name: 上传到 GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: 部署
        uses: actions/deploy-pages@v4